<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Emergency Interpreter - 3W Method</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        
        /* Fade in animation */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans antialiased min-h-screen">

    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg pb-10">
        
        <!-- Header -->
        <header class="bg-red-600 text-white p-6 rounded-b-3xl shadow-md text-center">
            <h1 class="text-2xl font-bold tracking-tight">AI EMERGENCY</h1>
            <p class="text-red-100 text-sm mt-1 font-medium tracking-wide">INTERPRETER • 3W METHOD</p>
        </header>

        <div class="p-5 space-y-6">

            <!-- 1. LINE Location Guide -->
            <section class="bg-blue-50 border border-blue-100 rounded-2xl p-4">
                <div class="flex items-center gap-2 mb-3 text-blue-800">
                    <i data-lucide="message-circle" class="w-5 h-5"></i>
                    <h2 class="font-bold">LINE Location Guide</h2>
                </div>
                <div class="bg-white rounded-xl p-3 shadow-sm border border-blue-50">
                    <ol class="space-y-3 text-sm text-slate-600">
                        <li class="flex items-center gap-3">
                            <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shrink-0">1</span>
                            Open LINE chat
                        </li>
                        <li class="flex items-center gap-3">
                            <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shrink-0">2</span>
                            Tap the <strong class="bg-slate-100 px-2 py-0.5 rounded border">+</strong> button
                        </li>
                        <li class="flex items-center gap-3">
                            <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shrink-0">3</span>
                            Select <strong>Location</strong>
                        </li>
                        <li class="flex items-center gap-3">
                            <span class="bg-blue-100 text-blue-700 w-6 h-6 rounded-full flex items-center justify-center font-bold text-xs shrink-0">4</span>
                            Tap <strong>Share</strong> or Send
                        </li>
                    </ol>
                </div>
            </section>

            <!-- 3. PDF Guide Upload -->
            <section class="bg-slate-50 border border-slate-200 rounded-2xl p-4">
                <div class="flex items-center justify-between mb-3">
                    <div class="flex items-center gap-2 text-slate-700">
                        <i data-lucide="file-text" class="w-5 h-5"></i>
                        <h2 class="font-bold">Emergency Protocol Guide</h2>
                    </div>
                </div>
                
                <div class="relative">
                    <input type="file" id="pdfInput" accept="application/pdf" class="hidden">
                    <label for="pdfInput" class="w-full flex flex-col items-center justify-center px-4 py-6 bg-white text-blue-500 rounded-xl shadow-sm tracking-wide uppercase border-2 border-blue-200 border-dashed cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition-colors">
                        <i data-lucide="upload-cloud" class="w-8 h-8 mb-2"></i>
                        <span class="mt-2 text-sm leading-normal font-semibold text-slate-600" id="fileNameDisplay">Upload PDF Guide</span>
                    </label>
                </div>
                
                <!-- PDF Preview Container -->
                <div id="pdfPreviewContainer" class="hidden mt-3 rounded-xl overflow-hidden border border-slate-200 bg-slate-200 h-64 relative">
                    <iframe id="pdfPreview" class="w-full h-full" src=""></iframe>
                    <button id="closePdfBtn" class="absolute top-2 right-2 bg-slate-800/50 hover:bg-slate-800 text-white p-1.5 rounded-full transition-colors">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </section>

            <!-- 4. Emergency Buttons -->
            <section>
                <h2 class="font-bold text-slate-700 mb-3 flex items-center gap-2">
                    <i data-lucide="alert-triangle" class="w-5 h-5 text-amber-500"></i>
                    Report an Incident
                </h2>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="generateReport('accident')" class="active:scale-[0.98] transition-transform flex items-center justify-between p-4 bg-orange-100 hover:bg-orange-200 border border-orange-300 rounded-xl text-orange-900 font-semibold shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="bg-orange-500 text-white p-2 rounded-lg">
                                <i data-lucide="band-aid" class="w-6 h-6"></i>
                            </div>
                            <span class="text-lg">Accident / Injury</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 opacity-50"></i>
                    </button>

                    <button onclick="generateReport('fire')" class="active:scale-[0.98] transition-transform flex items-center justify-between p-4 bg-red-100 hover:bg-red-200 border border-red-300 rounded-xl text-red-900 font-semibold shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="bg-red-500 text-white p-2 rounded-lg">
                                <i data-lucide="flame" class="w-6 h-6"></i>
                            </div>
                            <span class="text-lg">Fire / Evacuation</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 opacity-50"></i>
                    </button>

                    <button onclick="generateReport('supervisor')" class="active:scale-[0.98] transition-transform flex items-center justify-between p-4 bg-indigo-100 hover:bg-indigo-200 border border-indigo-300 rounded-xl text-indigo-900 font-semibold shadow-sm">
                        <div class="flex items-center gap-3">
                            <div class="bg-indigo-500 text-white p-2 rounded-lg">
                                <i data-lucide="user-cog" class="w-6 h-6"></i>
                            </div>
                            <span class="text-lg">Call Supervisor</span>
                        </div>
                        <i data-lucide="chevron-right" class="w-5 h-5 opacity-50"></i>
                    </button>
                </div>
            </section>

            <!-- 5. Generated 3W Report (Hidden by default) -->
            <section id="reportSection" class="hidden fade-in bg-white border border-slate-200 rounded-2xl shadow-md overflow-hidden">
                <div class="bg-slate-800 text-white p-3 flex justify-between items-center">
                    <h3 class="font-bold flex items-center gap-2">
                        <i data-lucide="file-text" class="w-4 h-4 text-emerald-400"></i>
                        Generated 3W Report
                    </h3>
                    <span id="reportTypeBadge" class="text-xs px-2 py-1 rounded bg-slate-600 font-medium">Type</span>
                </div>
                
                <div class="p-4 space-y-4">
                    <!-- WHO -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">Who (Identity)</label>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 text-slate-800 font-medium" id="reportWho">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- WHERE -->
                    <div>
                        <div class="flex justify-between items-end mb-1">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Where (Location)</label>
                            <span class="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-bold animate-pulse flex items-center gap-1">
                                <i data-lucide="map-pin" class="w-3 h-3"></i> Send LINE location now!
                            </span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 text-slate-800 font-medium" id="reportWhere">
                            <!-- Populated by JS -->
                        </div>
                    </div>

                    <!-- WHAT -->
                    <div>
                        <label class="block text-xs font-bold text-slate-500 mb-1 uppercase tracking-wider">What (Situation)</label>
                        <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 text-slate-800 font-medium" id="reportWhat">
                            <!-- Populated by JS -->
                        </div>
                    </div>
                </div>

                <!-- 6. Action Buttons -->
                <div class="p-4 bg-slate-50 border-t border-slate-100 grid grid-cols-2 gap-3">
                    <button onclick="copyReport()" id="copyBtn" class="flex items-center justify-center gap-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-colors active:scale-[0.98]">
                        <i data-lucide="copy" class="w-5 h-5"></i>
                        <span>Copy Text</span>
                    </button>
                    <button onclick="playAudio()" id="audioBtn" class="flex items-center justify-center gap-2 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold py-2.5 px-4 rounded-xl shadow-sm transition-colors active:scale-[0.98]">
                        <i data-lucide="volume-2" class="w-5 h-5"></i>
                        <span>Play Audio</span>
                    </button>
                </div>
            </section>

        </div>
    </div>

    <!-- Message Toast (Hidden) -->
    <div id="toast" class="fixed bottom-5 left-1/2 transform -translate-x-1/2 bg-slate-800 text-white px-4 py-2 rounded-lg shadow-lg text-sm font-medium transition-opacity duration-300 opacity-0 pointer-events-none z-50">
        Message copied!
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- Mock Data for Demo ---
        const scenarios = {
            accident: {
                title: "ACCIDENT",
                who: "I am [Your Name/ID], general worker.",
                where: "At Factory Floor A, near Machine Station 5. (Please see LINE Location)",
                what: "Worker suffered a hand injury and is bleeding. Requesting first aid immediately."
            },
            fire: {
                title: "FIRE",
                who: "I am [Your Name/ID], line supervisor.",
                where: "At Warehouse B, Chemical Storage Sector. (Please see LINE Location)",
                what: "Small fire detected near the electrical panel. Beginning evacuation process."
            },
            supervisor: {
                title: "ASSISTANCE",
                who: "I am [Your Name/ID], assembly operator.",
                where: "At Assembly Line C, Zone 2. (Please see LINE Location)",
                what: "Equipment malfunction causing production halt. Need technical supervisor immediately."
            }
        };

        // --- Variables ---
        let currentReportText = "";
        let synth = window.speechSynthesis;

        // --- DOM Elements ---
        const pdfInput = document.getElementById('pdfInput');
        const pdfPreviewContainer = document.getElementById('pdfPreviewContainer');
        const pdfPreview = document.getElementById('pdfPreview');
        const closePdfBtn = document.getElementById('closePdfBtn');
        const fileNameDisplay = document.getElementById('fileNameDisplay');
        const reportSection = document.getElementById('reportSection');

        // --- PDF Handling ---
        pdfInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file && file.type === "application/pdf") {
                const fileURL = URL.createObjectURL(file);
                pdfPreview.src = fileURL;
                pdfPreviewContainer.classList.remove('hidden');
                fileNameDisplay.textContent = file.name;
            } else if (file) {
                showToast("Please upload a valid PDF file.");
            }
        });

        closePdfBtn.addEventListener('click', () => {
            pdfPreviewContainer.classList.add('hidden');
            pdfPreview.src = "";
            pdfInput.value = ""; // Reset input
            fileNameDisplay.textContent = "Upload PDF Guide";
        });

        // --- 3W Report Generation ---
        function generateReport(type) {
            const data = scenarios[type];
            if(!data) return;

            // Populate UI
            document.getElementById('reportTypeBadge').textContent = data.title;
            document.getElementById('reportWho').textContent = data.who;
            document.getElementById('reportWhere').textContent = data.where;
            document.getElementById('reportWhat').textContent = data.what;

            // Store combined text for copy/audio
            currentReportText = `Emergency Report. WHO: ${data.who} WHERE: ${data.where} WHAT: ${data.what}`;

            // Show section with animation
            reportSection.classList.remove('hidden');
            
            // Scroll to report
            setTimeout(() => {
                reportSection.scrollIntoView({ behavior: 'smooth', block: 'end' });
            }, 100);
            
            // Stop any playing audio when a new report is generated
            if(synth.speaking) synth.cancel();
            updateAudioBtnIcon(false);
        }

        // --- Copy Functionality (Using execCommand as requested for max compatibility in iframes) ---
        function copyReport() {
            if (!currentReportText) return;

            // Create temporary textarea
            const textarea = document.createElement('textarea');
            textarea.value = currentReportText;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);

            // Select and copy
            textarea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast("Report copied to clipboard!");
                    // Visual feedback on button
                    const btn = document.getElementById('copyBtn');
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<i data-lucide="check" class="w-5 h-5 text-green-500"></i><span class="text-green-600">Copied!</span>';
                    lucide.createIcons();
                    setTimeout(() => {
                        btn.innerHTML = originalHTML;
                        lucide.createIcons();
                    }, 2000);
                } else {
                    showToast("Failed to copy text.");
                }
            } catch (err) {
                showToast("Oops, unable to copy.");
            }

            // Cleanup
            document.body.removeChild(textarea);
        }

        // --- Audio/TTS Functionality ---
        function playAudio() {
            if (!currentReportText) return;

            if (synth.speaking) {
                // If speaking, stop it
                synth.cancel();
                updateAudioBtnIcon(false);
                return;
            }

            const utterance = new SpeechSynthesisUtterance(currentReportText);
            
            // Try to find an English voice, prefer a clear one
            const voices = synth.getVoices();
            const englishVoice = voices.find(voice => voice.lang.includes('en-') && voice.name.includes('Google')) 
                                 || voices.find(voice => voice.lang.includes('en-'));
            if (englishVoice) {
                utterance.voice = englishVoice;
            }

            utterance.rate = 0.9; // Slightly slower for clarity
            
            utterance.onstart = () => updateAudioBtnIcon(true);
            utterance.onend = () => updateAudioBtnIcon(false);
            utterance.onerror = () => updateAudioBtnIcon(false);

            synth.speak(utterance);
        }

        function updateAudioBtnIcon(isPlaying) {
            const btn = document.getElementById('audioBtn');
            if (isPlaying) {
                btn.innerHTML = '<i data-lucide="square" class="w-5 h-5"></i><span>Stop Audio</span>';
                btn.classList.replace('bg-emerald-500', 'bg-red-500');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-red-600');
            } else {
                btn.innerHTML = '<i data-lucide="volume-2" class="w-5 h-5"></i><span>Play Audio</span>';
                btn.classList.replace('bg-red-500', 'bg-emerald-500');
                btn.classList.replace('hover:bg-red-600', 'hover:bg-emerald-600');
            }
            lucide.createIcons();
        }

        // Ensure voices are loaded (some browsers load them asynchronously)
        speechSynthesis.onvoiceschanged = () => {
            synth.getVoices();
        };

        // --- Toast Notification ---
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.remove('opacity-0');
            
            setTimeout(() => {
                toast.classList.add('opacity-0');
            }, 3000);
        }
    </script>
</body>
</html>
